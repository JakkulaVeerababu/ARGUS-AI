name: Argus AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dev Tools (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install black==26.5.1 ruff==0.11.13

      - name: Code Formatting Check (Black)
        run: black . --check

      - name: Linting Check (Ruff)
        run: ruff check .

      - name: Install Test Dependencies
        run: |
          pip install pytest==7.4.3 anyio==3.7.1 pytest-anyio loguru
          pip install fastapi==0.104.1 uvicorn==0.24.0
          pip install pydantic==2.5.2 "pydantic-settings>=2.0.0"
          pip install pandas==2.1.3 "numpy<2.0"
          pip install pyyaml==6.0.1 python-multipart==0.0.6 httpx==0.25.2
          pip install redis==5.0.1
          pip install rank-bm25==0.2.2
          pip install sentence-transformers==2.2.2
          pip install faiss-cpu==1.7.4
          pip install transformers onnxruntime

      - name: Run Tests (Pytest)
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .

  docker-build:
    name: Docker Compilation Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: argus-ai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
